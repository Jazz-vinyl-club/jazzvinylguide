backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/jazzvinylguide
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "albums"
    label: "Album Guides"
    folder: "_albums"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Album Title", name: "title", widget: "string" }
      - { label: "Artist", name: "artist", widget: "string" }
      - { label: "Label", name: "label", widget: "string" }
      - { label: "Year Released", name: "year", widget: "number" }
      - { label: "Recorded", name: "recorded", widget: "string" }
      - { label: "Original Label", name: "original_label", widget: "string" }
      - { label: "Original Catalogue #", name: "original_cat", widget: "string" }
      - { label: "SEO Description", name: "description", widget: "text" }
      - { label: "Guide Content", name: "body", widget: "markdown" }
