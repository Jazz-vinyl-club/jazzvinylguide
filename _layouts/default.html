<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Jazz Vinyl Guide</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        Jazz <span>Vinyl</span> Guide
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">Albums</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/contribute/' | relative_url }}">Contribute</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      <a href="https://jazzvinylguide.com">jazzvinylguide.com</a> —
      Collector-grade pressing guides for essential jazz albums.
      <a href="{{ '/contribute/' | relative_url }}">Contribute an edit</a>.
    </p>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
