[build]
  command = "pip install markdown && python3 build.py"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/status.html"
  [headers.values]
    X-Robots-Tag = "noindex"
